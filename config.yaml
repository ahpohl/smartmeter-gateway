# =========================================
# smartmeter-gateway — configuration
# =========================================

meter:
  master:
    rtu:
      device: /dev/ttyUSB0
      baud: 9600
      data_bits: 7
      stop_bits: 1
      parity: even
  grid:
      power_factor: 0.95
      leading: false    # false = inductive (lagging), true = capacitive (leading)
      frequency: 50.00
  slave:
    tcp:
      listen: 0.0.0.0
      port: 502
    unit_id: 1
    use_float_model: false

mqtt:
  broker: localhost
  port: 1883
  topic: fronius-bridge
  #user: mqtt
  #password: "your-secret-password"
  queue_size: 100
  reconnect_delay:
    min: 2
    max: 64
    exponential: true

logger:
  level: info
  modules:
    main: info
    mqtt: info
    meter:
      master: info
      slave: info